{% with active=nav_active|default:'' %}
<nav class="salon-dock" aria-label="Primary">
    <a href="{% url 'home' %}" class="{% if active == 'home' %}salon-dock__active{% endif %}" title="Library">
        <svg class="salon-icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
    </a>
    <a href="{% url 'home' %}#discover" class="{% if active == 'explore' %}salon-dock__active{% endif %}" title="Explore">
        <svg class="salon-icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </a>
    <a href="{% url 'home' %}#threshold" class="{% if active == 'ritual' %}salon-dock__active salon-dock__active--glow{% endif %}" title="Threshold">
        <svg class="salon-icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
    </a>
    {% if user.is_authenticated %}
        <span title="{{ user.username }}">
            <svg class="salon-icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </span>
    {% else %}
        <a href="{% url 'login' %}" title="Profile">
            <svg class="salon-icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </a>
    {% endif %}
</nav>
{% endwith %}
